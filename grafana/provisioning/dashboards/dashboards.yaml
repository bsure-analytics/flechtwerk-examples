apiVersion: 1

providers:
  - name: flechtwerk
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    # Dashboards are locked to the JSON files on disk — the reproducible posture
    # for this repo. Edit the files, not the UI.
    allowUiUpdates: false
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
